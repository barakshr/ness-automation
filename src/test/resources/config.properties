# ─── Application Under Test ───
aut.base.url=https://www.amazon.com
aut.default.language=en-US

# ─── Browser ───
browser.type=chrome
browser.headless=false
browser.window.maximize=true

# ─── Timeouts (seconds) ───
timeout.implicit=0
timeout.explicit=15
timeout.page.load=30
timeout.manual.intervention=120

# ─── Reporting ───
screenshot.on.failure=true
# Per-page shots: page objects must call attachScreenshotIfEveryPageEnabled after each navigation (not automatic for every URL).
screenshot.on.every.page=true

# ─── Test Data ───
testdata.scenarios.path=testdata/shopping-scenarios.json
